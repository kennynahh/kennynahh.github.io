<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Kenny Na — Hardware Engineer, Systems Design @ Waterloo</title>
<meta name="description" content="Systems Design Engineering student at the University of Waterloo. Currently an Electrical Lead at Waterloo Aerial Robotics Group. Previously interned at Arista Networks, Etched." />
<meta property="og:title" content="Kenny Na — Hardware Engineer" />
<meta property="og:image" content="images/image.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&family=Fira+Code:wght@400;500;700&family=Source+Code+Pro:wght@400;500;700&family=VT323&display=swap" rel="stylesheet" />

<style>
  :root {
    /* default theme: classic nano (light text on near-black) */
    --bg:      #0b0e10;
    --fg:      #d8dccf;
    --dim:     #6b7568;
    --accent:  #7fd1c4;
    --link:    #f4e285;
    --warn:    #f08a8a;
    --inv-bg:  var(--fg);
    --inv-fg:  var(--bg);

    --font:    'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
    --fs:      15px;
    --scan:    0.16;
    --glow:    0.05;
    --tilt-x:  1.6deg;
    --tilt-y:  0deg;
    --gut:     0;
  }

  /* themes */
  body[data-theme="amber"] {
    --bg: #120a02; --fg: #ffb648; --dim: #7a5418;
    --accent: #ffd089; --link: #ffe1a3; --warn: #ff7a3a;
  }
  body[data-theme="matrix"] {
    --bg: #03100a; --fg: #61f29c; --dim: #2a6845;
    --accent: #a8ffd3; --link: #c8ff8f; --warn: #ff7373;
  }
  body[data-theme="solarized"] {
    --bg: #002b36; --fg: #93a1a1; --dim: #586e75;
    --accent: #2aa198; --link: #b58900; --warn: #dc322f;
  }
  body[data-theme="dracula"] {
    --bg: #282a36; --fg: #f8f8f2; --dim: #6272a4;
    --accent: #8be9fd; --link: #f1fa8c; --warn: #ff5555;
  }
  body[data-theme="paperwhite"] {
    --bg: #f4efe6; --fg: #2a2520; --dim: #8a8478;
    --accent: #6a4a2a; --link: #b04a2a; --warn: #aa2a2a;
  }

  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: #000;
    color: var(--fg);
    font-family: var(--font);
    font-feature-settings: "calt" 0, "liga" 0;
  }
  body {
    background:
      radial-gradient(ellipse at 50% 65%, #14181b 0%, #06080a 60%, #000 100%);
  }
  #root { width: 100%; height: 100%; }
  .app-root { width: 100%; height: 100%; }

  /* ===== Stage / CSS-3D bezel ===== */
  .stage {
    width: 100%; height: 100%;
    display: grid; place-items: center;
    perspective: 2400px;
    perspective-origin: 50% 42%;
  }

  .bezel {
    --pad: 26px;
    position: relative;
    width: min(94vw, 1480px);
    height: min(92vh, 940px);
    padding: var(--pad);
    border-radius: 28px;
    background:
      radial-gradient(120% 80% at 50% 0%, #38322c 0%, #1b1714 55%, #0d0a08 100%);
    transform-style: preserve-3d;
    transform: rotateX(var(--tilt-x)) rotateY(var(--tilt-y));
    transition: transform 0.5s cubic-bezier(.2,.7,.2,1);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.05) inset,
      0 -3px 0 rgba(255,255,255,0.06) inset,
      0 3px 0 rgba(0,0,0,0.6) inset,
      0 60px 100px -20px rgba(0,0,0,0.75),
      0 30px 60px -10px rgba(0,0,0,0.55);
  }
  body[data-bezel="0"] .bezel {
    background: var(--bg); padding: 0; border-radius: 0; box-shadow: none;
    width: 100vw; height: 100vh;
  }
  body[data-bezel="0"] .bezel::before,
  body[data-bezel="0"] .bezel::after { display: none; }

  /* manufacturer plate */
  .bezel::after {
    content: 'CRT-1986   ◉ POWER';
    position: absolute;
    left: 50%; bottom: 6px;
    transform: translateX(-50%);
    font-family: var(--font);
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.20);
  }

  /* faint plastic mottle */
  .bezel::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    background-image:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,0.04) 0, transparent 32%),
      radial-gradient(circle at 88% 92%, rgba(255,255,255,0.025) 0, transparent 30%);
    pointer-events: none;
  }

  .screen {
    width: 100%; height: 100%;
    background: var(--bg);
    border-radius: 14px;
    position: relative;
    overflow: hidden;
    box-shadow:
      inset 0 0 100px rgba(0,0,0,0.7),
      inset 0 0 3px rgba(0,0,0,0.95),
      0 0 0 1px rgba(0,0,0,0.85),
      0 0 28px rgba(127, 209, 196, calc(var(--glow) * 1.4));
    isolation: isolate;
  }
  body[data-bezel="0"] .screen { border-radius: 0; box-shadow: none; }

  /* CRT overlays */
  .scanlines {
    position: absolute; inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        180deg,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,var(--scan)) 3px,
        rgba(0,0,0,0) 4px
      );
    mix-blend-mode: multiply;
    z-index: 20;
  }
  .vignette {
    position: absolute; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
    z-index: 21;
  }
  .glow {
    position: absolute; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 35%, rgba(127,209,196,var(--glow)), transparent 65%);
    z-index: 19;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    49%      { opacity: 1; }
    50%      { opacity: 0.985; }
    51%      { opacity: 1; }
    92%      { opacity: 1; }
    93%      { opacity: 0.992; }
  }
  .screen-inner {
    width: 100%; height: 100%;
    position: relative;
    animation: flicker 7s infinite;
  }

  /* ===== nano app layout ===== */
  .nano {
    width: 100%; height: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto auto auto;
    font-size: var(--fs);
    line-height: 1.45;
    color: var(--fg);
    background: var(--bg);
  }

  .bar { user-select: none; padding: 2px 12px; }
  .inv { background: var(--inv-bg); color: var(--inv-fg); }

  .title-bar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    font-weight: 500;
  }
  .title-bar .l { text-align: left; }
  .title-bar .c { text-align: center; padding: 0 24px; white-space: nowrap; }
  .title-bar .r { text-align: right; }

  .body {
    overflow-y: auto;
    overflow-x: hidden;
    padding: 6px 12px 10px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.18) transparent;
  }
  .body::-webkit-scrollbar { width: 8px; }
  .body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

  .line {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    min-height: calc(var(--fs) * 1.45);
  }
  .line .gutter {
    flex: 0 0 var(--gut);
    color: var(--dim);
    text-align: right;
    user-select: none;
  }
  .line .content {
    flex: 1 1 auto;
    min-width: 0;
    white-space: pre-wrap;
  }

  .line.current { background: rgba(255,255,255,0.05); }
  body[data-theme="paperwhite"] .line.current { background: rgba(0,0,0,0.05); }

  .line.current .content::before {
    content: '';
    display: inline-block;
    width: 0.55ch; height: 1em;
    background: var(--fg);
    vertical-align: -0.12em;
    margin-right: 0;
    animation: blink 1.05s steps(2) infinite;
  }
  @keyframes blink { 50%, 100% { opacity: 0; } }

  .line.h .content   { color: var(--accent); font-weight: 600; }
  .line.dim .content { color: var(--dim); }
  .line.link         { cursor: pointer; }
  .line.link .content{ color: var(--link); }
  .line.link:hover .content { filter: brightness(1.3); }
  .line.link .marker { color: var(--accent); }

  .img-line { margin: 6px 0; }
  .img-line .frame {
    display: inline-block;
    border: 1px solid rgba(255,255,255,0.12);
    padding: 4px;
    background: rgba(255,255,255,0.02);
  }
  .img-line img {
    display: block;
    max-height: 220px;
    max-width: min(420px, 60%);
    object-fit: cover;
    filter: contrast(1.05) saturate(0.8) brightness(0.92);
  }
  .img-line .cap {
    color: var(--dim);
    font-size: calc(var(--fs) * 0.85);
    margin-top: 2px;
  }

  /* ===== Status & shortcut rail ===== */
  .status {
    padding: 1px 12px;
    min-height: calc(var(--fs) * 1.45);
    text-align: center;
    transition: background 0.2s, color 0.2s;
  }
  .status.empty { visibility: hidden; }

  .shortcuts {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    column-gap: 10px;
    padding: 0 12px;
  }
  .sc {
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
    white-space: nowrap;
    padding: 1px 0;
    cursor: pointer;
    user-select: none;
  }
  .sc .k {
    background: var(--inv-bg);
    color: var(--inv-fg);
    padding: 0 4px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .sc .lbl { color: var(--fg); }
  .sc:hover .k { background: var(--accent); color: var(--bg); }
  .sc:hover .lbl { color: var(--accent); }

  /* ===== prompts (read file, search, goto) ===== */
  .prompt {
    padding: 1px 12px;
    background: var(--inv-bg);
    color: var(--inv-fg);
    display: flex;
    gap: 8px;
    align-items: baseline;
  }
  .prompt input {
    background: transparent;
    color: var(--inv-fg);
    border: none;
    outline: none;
    font: inherit;
    flex: 1;
    caret-color: var(--inv-fg);
  }
  .prompt .label { font-weight: 600; }

  /* ===== file picker (^R) ===== */
  .picker {
    position: absolute;
    left: 0; right: 0;
    bottom: calc(var(--fs) * 1.45 * 3 + 4px);
    background: var(--bg);
    border-top: 1px solid var(--dim);
    padding: 4px 12px;
    z-index: 40;
  }
  .picker .label { color: var(--accent); margin-bottom: 4px; }
  .picker .opt {
    padding: 1px 6px;
    cursor: pointer;
    display: flex; justify-content: space-between; gap: 16px;
  }
  .picker .opt:hover { background: rgba(255,255,255,0.08); }
  .picker .opt.sel  { background: var(--inv-bg); color: var(--inv-fg); }
  .picker .opt .meta { color: var(--dim); }
  .picker .opt.sel .meta { color: var(--inv-fg); opacity: 0.7; }

  /* ===== help / exit modal — rendered as another nano buffer ===== */
  .overlay {
    position: absolute; inset: 0;
    z-index: 60;
    background: var(--bg);
    display: grid;
    grid-template-rows: auto 1fr auto auto;
  }

  /* ===== toast (write out / exec) ===== */
  .toast {
    position: absolute;
    left: 50%; bottom: calc(var(--fs) * 1.45 * 3 + 10px);
    transform: translateX(-50%);
    background: var(--inv-bg); color: var(--inv-fg);
    padding: 3px 12px;
    z-index: 50;
    animation: toastIn 0.25s ease;
    pointer-events: none;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 6px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }

  /* ===== Tweaks panel reskin to match nano vibe ===== */
  .tweaks-panel { font-family: var(--font); }

  /* boot scanline sweep */
  @keyframes bootSweep {
    0%   { transform: translateY(-100%); opacity: 0; }
    10%  { opacity: 0.4; }
    100% { transform: translateY(100vh); opacity: 0; }
  }
  .boot-sweep {
    position: absolute; left: 0; right: 0; height: 40%;
    background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
    pointer-events: none;
    z-index: 22;
    animation: bootSweep 1.4s ease-out 1;
  }
</style>
</head>

<body data-theme="classic" data-bezel="1">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="nano.jsx"></script>
</body>
</html>
